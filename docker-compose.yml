version: "3.9"

services:
  api:
    build: .
    container_name: golang-sandbox-api
    environment:
      - PORT=8080
      - ENV=production
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/up"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

