version: "3.9"

services:
  api:
    build:
      context: .
      target: builder
    container_name: golang-sandbox-api-dev
    environment:
      - PORT=8080
      - ENV=development
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/tmp  # Exclude tmp directory from volume mount
    working_dir: /app
    command: sh -c "go install github.com/air-verse/air@latest && air"
    restart: unless-stopped
